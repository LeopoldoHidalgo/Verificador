<script>
    // 1. Esperamos a que todo el HTML y las librerías carguen
    window.addEventListener('load', () => {
        console.log("Librería cargada y lista");
    });

    let productos = JSON.parse(localStorage.getItem('misProductos')) || {};
    let html5QrCode; // Declaramos la variable globalmente

    async function iniciarCamara() {
        const startBtn = document.getElementById('startBtn');
        const readerDiv = document.getElementById('reader');
        const resultBox = document.getElementById('result-box');

        // 2. Inicializamos el objeto justo antes de usarlo
        try {
            if (!html5QrCode) {
                html5QrCode = new Html5Qrcode("reader");
            }

            startBtn.style.display = 'none';
            readerDiv.style.display = 'block';
            resultBox.innerHTML = "<p>Cargando cámara...</p>";

            const config = { 
                fps: 10, 
                qrbox: { width: 280, height: 150 },
                aspectRatio: 1.0 
            };

            await html5QrCode.start(
                { facingMode: "environment" }, 
                config, 
                (decodedText) => {
                    mostrarPrecio(decodedText);
                    if (navigator.vibrate) navigator.vibrate(50);
                }
            );
            
            resultBox.innerHTML = "<p>Apunta al código...</p>";

        } catch (err) {
            console.error("Error detallado:", err);
            resultBox.innerHTML = `<p style="color:red">Error: No se pudo acceder. Verifica permisos de cámara.</p>`;
            startBtn.style.display = 'block';
        }
    }

    function mostrarPrecio(codigo) {
        const resBox = document.getElementById('result-box');
        const p = productos[codigo];
        if (p) {
            resBox.innerHTML = `
                <div style="font-size:1.2rem; font-weight:bold;">${p.nombre}</div>
                <div style="font-size:2rem; color:green;">$${p.precio}</div>
                <small>${codigo}</small>
            `;
        } else {
            resBox.innerHTML = `
                <div style="color:orange">Código: ${codigo}</div>
                <p>No registrado</p>
                <button onclick="prellenarForm('${codigo}')" style="background:#6c757d; color:white; border:none; padding:5px; border-radius:5px;">Registrar</button>
            `;
        }
    }

    function prellenarForm(codigo) {
        document.getElementById('newCode').value = codigo;
        document.getElementById('newName').focus();
    }

    function guardarProducto() {
        const code = document.getElementById('newCode').value;
        const name = document.getElementById('newName').value;
        const price = document.getElementById('newPrice').value;

        if(code && name && price) {
            productos[code] = { nombre: name, precio: price };
            localStorage.setItem('misProductos', JSON.stringify(productos));
            alert("¡Guardado!");
            document.getElementById('newCode').value = '';
            document.getElementById('newName').value = '';
            document.getElementById('newPrice').value = '';
        } else {
            alert("Faltan datos");
        }
    }
</script>
