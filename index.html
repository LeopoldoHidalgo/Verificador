<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verificador de Precios Pro - Comentado</title>
  
  <style>
    /* --- CONFIGURACIÓN VISUAL (CSS) --- */
    :root {
      --color-fondo: #2c3e50;    /* Color del fondo de la pantalla */
      --color-primario: #34495e; /* Color de los títulos */
      --color-acento: #2ecc71;   /* Color verde del precio gigante */
      --color-texto: #333;       /* Color del texto general */
    }
    
    /* Estilos para que el verificador se vea como una app de Tablet */
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: var(--color-fondo);
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
    }

    /* Contenedor blanco central */
    .kiosko-container {
      width: 95%;
      max-width: 800px;
      background: #ffffff;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3); 
      text-align: center;
    }

    /* Diseño del precio gigante */
    .precio-producto { 
      font-size: 8rem; 
      color: var(--color-acento); 
      margin: 10px 0 0 0; 
      font-weight: 800; 
    }

    /* Botón secreto del engrane */
    .admin-secreto {
      position: absolute; top: 15px; right: 15px;
      width: 45px; height: 45px; background: transparent;
      border: none; cursor: pointer; opacity: 0.1;
    }

    /* Etiqueta de estado en la esquina inferior */
    .status-offline {
      position: absolute; bottom: 10px; left: 10px;
      font-size: 0.8rem; color: white; opacity: 0.5;
    }

    .oculto { display: none !important; }
  </style>
</head>

<body onload="inicializarApp()">

  <button class="admin-secreto" onclick="configurarCSV()">⚙️</button>
  
  <div id="statusLabel" class="status-offline">Estado: Sincronizando...</div>

  <div class="kiosko-container">
    
    <div id="pantallaCaptura">
      <h1>Verificador</h1>
      <p style="font-size: 1.4rem; color: #7f8c8d;">Escanea el código o escribe el nombre</p>
      <input type="text" id="lectorEntrada" placeholder="Buscar producto..." autofocus>
      <div style="margin-top:15px;">
        <button onclick="accionVerificar()" style="width:100%; padding:20px; font-size:1.6rem; background:#2980b9; color:white; border:none; border-radius:12px; cursor:pointer;">Consultar Precio</button>
      </div>
    </div>
    
    <div id="pantallaCoincidencias" style="display:none; text-align:left; max-height:400px; overflow-y:auto;">
      <p style="text-align:center; font-weight:bold;">Selecciona un producto:</p>
      <div id="listaCoincidencias"></div>
    </div>
    
    <div id="pantallaResultado" style="display:none; background:#f1f2f6; padding:40px; border-radius:15px;"></div>
    
    <button id="btnVolver" class="oculto" onclick="restablecerPantalla()" style="background-color: #7f8c8d; color:white; border:none; padding:15px; border-radius:10px; margin-top: 20px; width:100%;">🔍 Nueva Consulta</button>
  </div>

  <script>
    /* --- LÓGICA DE PROGRAMACIÓN (JAVASCRIPT) --- */

    let productosRegistrados = {}; // Diccionario donde se guardan los productos en memoria RAM
    let temporizadorRegreso = null; // Variable para limpiar la pantalla automáticamente

    // Función principal que arranca todo
    async function inicializarApp() {
      const url = localStorage.getItem('csv_master_url');
      if (!url) {
        alert("Configura el enlace CSV en el icono del engrane.");
        return;
      }
      
      // Primera descarga de datos al abrir
      await cargarDesdeSheets(url);

      // Sincronización automática: Cada 30 minutos (1,800,000 ms) intenta bajar cambios
      setInterval(() => {
        cargarDesdeSheets(url);
      }, 1800000); 
    }

    // Guarda la URL de Google Sheets en la memoria del navegador
    function configurarCSV() {
      const url = prompt("Pega el enlace CSV de Google Sheets:", localStorage.getItem('csv_master_url') || "");
      if (url) {
        localStorage.setItem('csv_master_url', url);
        location.reload(); // Reinicia para aplicar la nueva URL
      }
    }

    // Descarga el archivo desde Internet o usa la copia de seguridad (Caché)
    async function cargarDesdeSheets(url) {
      const statusLabel = document.getElementById("statusLabel");
      try {
        // "Anti-Caché": Agregamos la hora actual a la URL para que Google siempre nos de lo más nuevo
        const urlLimpia = url + (url.includes('?') ? '&' : '?') + "t=" + new Date().getTime();
        
        const res = await fetch(urlLimpia);
        if (!res.ok) throw new Error("Error de red");
        
        const data = await res.text();
        
        // Guardamos una copia en el almacenamiento local (Disco duro/Flash) para uso offline
        localStorage.setItem('cache_csv_data', data);
        
        procesarDatosCSV(data); // Convertimos el texto a lista de productos
        statusLabel.innerText = "Estado: Conectado (Actualizado " + new Date().toLocaleTimeString() + ")";
      } catch (e) {
        // Si falla el internet, buscamos la última copia guardada
        const cache = localStorage.getItem('cache_csv_data');
        if (cache) {
          procesarDatosCSV(cache);
          statusLabel.innerText = "Estado: Trabajando sin conexión (Caché local)";
        } else {
          statusLabel.innerText = "Estado: Error - Sin conexión y sin base de datos previa";
        }
      }
    }

    // Convierte el texto gigante del CSV en un formato que el programa entienda
    function procesarDatosCSV(data) {
      const filas = data.split(/\r?\n/).filter(f => f.trim() !== "").slice(1);
      productosRegistrados = {}; // Limpiamos la memoria antes de llenar
      
      filas.forEach(f => {
        // Esta regla separa por comas, pero respeta las comas que estén dentro de comillas
        const c = f.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
        
        if (c.length >= 6) { 
          // c[0] es Código, c[1] Nombre, c[2] Presentación, c[5] Precio
          const cod = c[0].replace(/"/g, '').trim().toLowerCase();
          productosRegistrados[cod] = {
            nombre: c[1].replace(/"/g, '').trim(),
            presentacion: c[2].replace(/"/g, '').trim(),
            precio: parseFloat(c[5].replace(/"/g, '').trim()) || 0
          };
        }
      });
    }

    // Lógica para buscar el producto (Ya sea por código de barras o por nombre)
    function dbConsultarProducto(busqueda) {
      const termino = busqueda.toLowerCase().trim();
      let coincidencias = [];

      // 1. Buscamos si existe el código exacto
      if (productosRegistrados[termino]) {
        coincidencias.push(productosRegistrados[termino]);
        return coincidencias;
      }

      // 2. Si no es un código, buscamos el texto dentro de los nombres de productos
      for (const codigo in productosRegistrados) {
        if (productosRegistrados[codigo].nombre.toLowerCase().includes(termino)) {
          coincidencias.push(productosRegistrados[codigo]);
        }
      }
      return coincidencias;
    }

    // Se activa al presionar Enter o dar clic al botón de buscar
    function accionVerificar() {
      const input = document.getElementById("lectorEntrada");
      const busqueda = input.value.trim();
      if (!busqueda) return;

      const resultados = dbConsultarProducto(busqueda);
      
      // Ocultamos el buscador y mostramos el botón "Volver"
      document.getElementById("pantallaCaptura").classList.add("oculto");
      document.getElementById("btnVolver").classList.remove("oculto");

      if (resultados.length === 1) {
        mostrarPantallaFinal(resultados[0]); // Mostrar precio directo
      } else if (resultados.length > 1) {
        mostrarListaCoincidencias(resultados); // Mostrar lista para elegir
      } else {
        // Producto no encontrado
        const display = document.getElementById("pantallaResultado");
        display.style.display = "block";
        display.innerHTML = `<p style="font-size:2rem; color:red;">❌ Producto no registrado</p>`;
        iniciarTemporizador();
      }
      input.value = ""; // Limpia el buscador para la siguiente persona
    }

    // Dibuja el precio en la pantalla
    function mostrarPantallaFinal(prod) {
      const display = document.getElementById("pantallaResultado");
      display.style.display = "block";
      display.innerHTML = `
        <p style="font-size:2.5rem; margin:0; font-weight:700;">${prod.nombre}</p>
        <p style="font-size:1.6rem; color:#7f8c8d; margin:5px 0;">${prod.presentacion}</p>
        <p class="precio-producto">$${prod.precio.toFixed(2)}</p>
      `;
      iniciarTemporizador(); // Empezar cuenta regresiva para limpiar pantalla
    }

    // Si hay varios parecidos, crea botones para cada uno
    function mostrarListaCoincidencias(lista) {
      const pLista = document.getElementById("pantallaCoincidencias");
      const divLista = document.getElementById("listaCoincidencias");
      pLista.style.display = "block";
      divLista.innerHTML = "";
      
      lista.forEach(prod => {
        const item = document.createElement("div");
        item.style = "background:#fafafa; padding:15px; margin-bottom:10px; border-radius:12px; border:2px solid #eee; cursor:pointer;";
        item.innerHTML = `<b>${prod.nombre}</b> - ${prod.presentacion}`;
        item.onclick = () => {
          pLista.style.display = "none";
          mostrarPantallaFinal(prod);
        };
        divLista.appendChild(item);
      });
      iniciarTemporizador();
    }

    // Regresa a la pantalla principal tras 10 segundos de inactividad
    function iniciarTemporizador() {
      if (temporizadorRegreso) clearTimeout(temporizadorRegreso);
      temporizadorRegreso = setTimeout(restablecerPantalla, 10000); 
    }

    // Limpia las pantallas y enfoca el buscador
    function restablecerPantalla() {
      if (temporizadorRegreso) clearTimeout(temporizadorRegreso);
      document.getElementById("pantallaResultado").style.display = "none";
      document.getElementById("pantallaCoincidencias").style.display = "none";
      document.getElementById("btnVolver").classList.add("oculto");
      document.getElementById("pantallaCaptura").classList.remove("oculto");
      document.getElementById("lectorEntrada").focus();
    }

    // Detectar cuando se usa el escáner (Tecla Enter)
    document.getElementById("lectorEntrada").addEventListener("keypress", (e) => {
      if (e.key === "Enter") accionVerificar();
    });
  </script>
</body>
</html>
