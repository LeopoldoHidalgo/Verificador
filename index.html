<div class="card">
    <h2>Escáner de Precios</h2>
    <!-- Botón para forzar el encendido -->
    <button id="startBtn" onclick="iniciarCamara()" style="background:#28a745; margin-bottom:10px;">Encender Cámara</button>
    
    <div id="reader" style="display:none;"></div>
    
    <div class="result-box" id="result-box">
        <p>Presiona el botón para escanear</p>
    </div>
</div>

<script>
    let productos = JSON.parse(localStorage.getItem('misProductos')) || {};
    const html5QrCode = new Html5Qrcode("reader");

    async function iniciarCamara() {
        document.getElementById('startBtn').style.display = 'none';
        document.getElementById('reader').style.display = 'block';
        document.getElementById('result-box').innerHTML = "<p>Cargando cámara...</p>";

        const config = { fps: 10, qrbox: { width: 250, height: 150 } };

        try {
            await html5QrCode.start(
                { facingMode: "environment" }, 
                config, 
                (decodedText) => {
                    mostrarPrecio(decodedText);
                    // Vibración corta al detectar (solo en algunos Android)
                    if (navigator.vibrate) navigator.vibrate(100);
                }
            );
            document.getElementById('result-box').innerHTML = "<p>Apunta al código...</p>";
        } catch (err) {
            console.error(err);
            document.getElementById('result-box').innerHTML = `<p style="color:red">Error: ${err}</p>`;
            document.getElementById('startBtn').style.display = 'block';
        }
    }

    function mostrarPrecio(codigo) {
        const resBox = document.getElementById('result-box');
        const p = productos[codigo];
        if (p) {
            resBox.innerHTML = `<div class="name">${p.nombre}</div><div class="price">$${p.precio}</div>`;
        } else {
            resBox.innerHTML = `<div>No registrado</div><button onclick="prellenarForm('${codigo}')">Registrar ${codigo}</button>`;
        }
    }

    function prellenarForm(codigo) {
        document.getElementById('newCode').value = codigo;
        document.getElementById('newName').focus();
    }
</script>
