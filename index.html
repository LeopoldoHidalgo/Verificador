<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verificador de Precios Kiosko - 8 Columnas</title>
  
  <style>
    /* 🎨 VARIABLES DE DISEÑO: Controlan los colores globales */
    :root {
      --color-fondo: #2c3e50;    /* Azul oscuro del fondo */
      --color-primario: #34495e; /* Gris azulado para textos y botones */
      --color-acento: #2ecc71;   /* Verde para el precio gigante */
      --color-texto: #333;       /* Color de texto base */
    }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: var(--color-fondo);
      color: var(--color-texto);
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      box-sizing: border-box;
      position: relative;
    }

    /* CONTENEDOR PRINCIPAL: Diseñado para verse bien en Tabletas */
    .kiosko-container {
      width: 95%;
      max-width: 800px;
      background: #ffffff;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3); 
      text-align: center;
      max-height: 90vh;
      display: flex;
      flex-direction: column;
    }

    h1 {
      color: var(--color-primario);
      font-size: 3rem;
      margin: 0 0 10px 0;
      font-weight: 800;
    }

    .instruccion {
      font-size: 1.4rem;
      color: #7f8c8d;
      margin: 0 0 30px 0;
    }

    /* CAMPO DE ENTRADA: Grande para facilitar la escritura táctil */
    input[type="text"] {
      width: 100%;
      padding: 20px;
      font-size: 1.8rem;
      text-align: center;
      border: 3px solid #dfe6e9;
      border-radius: 12px;
      box-sizing: border-box;
      outline: none;
      background-color: #fafafa;
    }

    .search-group {
      display: flex;
      gap: 10px;
      margin-top: 15px;
    }

    button {
      flex: 1;
      padding: 20px;
      font-size: 1.6rem;
      background-color: #2980b9; 
      color: white;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-weight: bold;
      transition: background-color 0.2s;
    }

    button:hover { background-color: #2471a3; }

    /* ÁREA DE RESULTADO: Donde aparece el nombre y el precio gigante */
    .display-precio {
      padding: 60px 20px; 
      background: #f1f2f6;
      border-radius: 15px;
      display: none; 
      animation: fadeIn 0.3s ease-in-out;
    }

    .nombre-producto { font-size: 2.5rem; color: var(--color-primario); margin: 0; font-weight: 700; }
    .presentacion-producto { font-size: 1.6rem; color: #7f8c8d; margin: 5px 0; font-weight: 600; }
    
    /* PRECIO GIGANTE: Lo más importante del verificador */
    .precio-producto { font-size: 9rem; color: var(--color-acento); margin: 10px 0 0 0; font-weight: 800; }

    /* LISTA DE COINCIDENCIAS: Aparece cuando hay varios productos con nombre similar */
    .contenedor-coincidencias {
      display: none;
      text-align: left;
      animation: fadeIn 0.3s ease-in-out;
      overflow-y: auto;
      flex-grow: 1;
      padding: 10px;
    }

    .item-coincidencia {
      background: #fafafa;
      padding: 15px;
      margin-bottom: 10px;
      border-radius: 12px;
      border: 2px solid #eee;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .item-nombre { font-size: 1.4rem; font-weight: bold; margin: 0; }
    .item-presentacion { font-size: 1rem; color: #7f8c8d; }

    .oculto { display: none !important; }

    /* BOTÓN DE CONFIGURACIÓN: Casi invisible en la esquina superior derecha */
    .admin-secreto {
      position: absolute; top: 15px; right: 15px;
      width: 45px; height: 45px; background: transparent;
      border: none; cursor: pointer; opacity: 0.1; transition: opacity 0.3s;
    }
    .admin-secreto:hover { opacity: 0.8; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body onload="inicializarApp()">

  <button class="admin-secreto" onclick="configurarCSV()">⚙️</button>

  <div class="kiosko-container">
    <div id="pantallaCaptura">
      <h1>Verificador</h1>
      <p class="instruccion">Escanea el código o escribe el nombre</p>
      <input type="text" id="lectorEntrada" placeholder="Buscar producto..." autofocus>
      <div class="search-group">
        <button onclick="accionVerificar()">Consultar Precio</button>
      </div>
    </div>
    
    <div id="pantallaCoincidencias" class="contenedor-coincidencias">
      <p style="text-align:center; font-weight:bold;">Se encontraron varios. Selecciona uno:</p>
      <div id="listaCoincidencias"></div>
    </div>
    
    <div id="pantallaResultado" class="display-precio"></div>
    
    <button id="btnVolver" class="oculto" onclick="restablecerPantalla()" style="background-color: #7f8c8d; margin-top: 20px;">🔍 Nueva Consulta</button>
  </div>

  <script>
    let productosRegistrados = {}; // Aquí guardamos toda la lista del Excel
    let temporizadorRegreso = null; // Controla que la pantalla se limpie sola tras 10 seg

    // 1. Al cargar la app, busca el enlace guardado en la memoria del navegador
    async function inicializarApp() {
      const url = localStorage.getItem('csv_master_url');
      if (!url) {
        alert("Por favor, configura el enlace de Google Sheets en el engrane superior.");
        return;
      }
      cargarDesdeSheets(url);
    }

    // 2. Función para guardar o cambiar el enlace del CSV
    function configurarCSV() {
      const url = prompt("Pega el enlace CSV de Google Sheets (8 columnas):", localStorage.getItem('csv_master_url') || "");
      if (url) {
        localStorage.setItem('csv_master_url', url);
        location.reload(); // Recarga para aplicar cambios
      }
    }

    // 3. Descarga y procesa el archivo de Google Sheets
    async function cargarDesdeSheets(url) {
      try {
        const res = await fetch(url);
        const data = await res.text();
        // Dividimos por filas y quitamos la primera (títulos)
        const filas = data.split(/\r?\n/).filter(f => f.trim() !== "").slice(1);
        
        productosRegistrados = {};
        filas.forEach(f => {
          // El "RegEx" separa por comas pero ignora las comas dentro de comillas
          const c = f.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
          if (c.length >= 6) { 
            const cod = c[0].replace(/"/g, '').trim().toLowerCase();
            productosRegistrados[cod] = {
              nombre: c[1].replace(/"/g, '').trim(),
              presentacion: c[2].replace(/"/g, '').trim(),
              // CONFIGURACIÓN 8 COLUMNAS: 
              // Buscamos el "Precio Público" en el índice 5 (Columna F)
              precio: parseFloat(c[5].replace(/"/g, '').trim()) || 0
            };
          }
        });
      } catch (e) {
        console.error("Error cargando Sheets", e);
      }
    }

    // 4. Lógica de búsqueda (Por código o por letras en el nombre)
    function dbConsultarProducto(busqueda) {
      const termino = busqueda.toLowerCase().trim();
      let coincidencias = [];

      // Intenta buscar coincidencia exacta de código
      if (productosRegistrados[termino]) {
        coincidencias.push(productosRegistrados[termino]);
        return coincidencias;
      }

      // Si no es un código, busca si el texto está contenido en algún nombre
      for (const codigo in productosRegistrados) {
        if (productosRegistrados[codigo].nombre.toLowerCase().includes(termino)) {
          coincidencias.push(productosRegistrados[codigo]);
        }
      }
      return coincidencias;
    }

    // 5. Maneja el evento de clic en el botón de consulta
    function accionVerificar() {
      const input = document.getElementById("lectorEntrada");
      const busqueda = input.value.trim();
      if (!busqueda) return;

      const resultados = dbConsultarProducto(busqueda);
      
      document.getElementById("pantallaCaptura").classList.add("oculto");
      document.getElementById("btnVolver").classList.remove("oculto");

      if (resultados.length === 1) {
        mostrarPantallaFinal(resultados[0]);
      } else if (resultados.length > 1) {
        mostrarListaCoincidencias(resultados);
      } else {
        document.getElementById("pantallaResultado").style.display = "block";
        document.getElementById("pantallaResultado").innerHTML = `<p class="no-encontrado">❌ No encontrado</p>`;
        iniciarTemporizador();
      }
      input.value = "";
    }

    // 6. Dibuja el precio gigante
    function mostrarPantallaFinal(prod) {
      const display = document.getElementById("pantallaResultado");
      display.style.display = "block";
      display.innerHTML = `
        <p class="nombre-producto">${prod.nombre}</p>
        <p class="presentacion-producto">${prod.presentacion}</p>
        <p class="precio-producto">$${prod.precio.toFixed(2)}</p>
      `;
      iniciarTemporizador();
    }

    // 7. Dibuja la lista si hay varios artículos parecidos
    function mostrarListaCoincidencias(lista) {
      const pLista = document.getElementById("pantallaCoincidencias");
      const divLista = document.getElementById("listaCoincidencias");
      pLista.style.display = "block";
      divLista.innerHTML = "";
      
      lista.forEach(prod => {
        const item = document.createElement("div");
        item.className = "item-coincidencia";
        item.innerHTML = `<div><p class="item-nombre">${prod.nombre}</p><p class="item-presentacion">${prod.presentacion}</p></div><div>➜</div>`;
        item.onclick = () => {
          pLista.style.display = "none";
          mostrarPantallaFinal(prod);
        };
        divLista.appendChild(item);
      });
      iniciarTemporizador();
    }

    // 8. Temporizador: Si nadie toca nada en 10 seg, vuelve al inicio
    function iniciarTemporizador() {
      if (temporizadorRegreso) clearTimeout(temporizadorRegreso);
      temporizadorRegreso = setTimeout(restablecerPantalla, 10000); 
    }

    // 9. Limpia todo y vuelve a la pantalla de búsqueda
    function restablecerPantalla() {
      if (temporizadorRegreso) clearTimeout(temporizadorRegreso);
      document.getElementById("pantallaResultado").style.display = "none";
      document.getElementById("pantallaCoincidencias").style.display = "none";
      document.getElementById("btnVolver").classList.add("oculto");
      document.getElementById("pantallaCaptura").classList.remove("oculto");
      document.getElementById("lectorEntrada").focus();
    }

    // Atajo: Al dar Enter en el teclado o escáner, busca automáticamente
    document.getElementById("lectorEntrada").addEventListener("keypress", (e) => {
      if (e.key === "Enter") accionVerificar();
    });
  </script>
</body>
</html>
